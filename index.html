<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>

  <div class="cuadro-principal">
    <div class="cuadros">
      <section class="cuadro-izq">

        <div class="titulo">
          <h1>Tu Resultado</h1>
        </div>

        <div class="num-resultado">
          <h1>76</h1>
          <p>de 100</p>
        </div>

        <div class="respuesta">
          <h1>Perfecto</h1>

          <p>Tu resultado es mayor que el 65% de las personas que hicieron este test</p>
        </div>

      </section>

      <!--division del segundo cuadro-->

      <section class="cuadro-der">

      <div class="cuadro">
        <div class="titulo2">
          <h2>Resultado</h2>
        </div>

      <div class="card">
          <div class="item reaction">
            <span><img src="/assets/images/icon-reaction.svg" alt=""> Reaccion</span>
            <span><b>80</b> / 100</span>
          </div>

        <div class="item memory">
            <span><img src="/assets/images/icon-memory.svg" alt=""> Memoria</span>
            <span><b>92</b> / 100</span>
        </div>

        <div class="item verbal">
            <span><img src="/assets/images/icon-verbal.svg" alt=""> Verbal</span>
            <span><b>61</b> / 100</span>
        </div>

        <div class="item visual">
            <span><img src="/assets/images/icon-visual.svg" alt=""> Visual</span>
            <span><b>73</b> / 100</span>
        </div>

          <div class="boton">
            <button>Continuar</button>
          </div>
      </div>
             
  
      </div>


      </section>
    </div>
  </div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
